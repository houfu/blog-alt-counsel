name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repo health check
        run: bash scripts/verify.sh

      - name: Lint post folders
        run: node scripts/lint-posts.js

      - name: Lexical conversion tests
        run: npm test
