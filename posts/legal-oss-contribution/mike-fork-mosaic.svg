<svg viewBox="0 0 800 970" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">87 of 100 forks are unchanged copies</title>
  <desc id="desc">A 10 by 10 grid representing 100 of Mike's most recently active forks. 87 cells are grey (identical to upstream), 4 are faint green (size-modified with no commits), 4 are medium green (1 to 9 commits ahead), 4 are dark green (10 or more commits ahead), and 1 is dark green with a gold ring (Turkish localisation, diverged history).</desc>

