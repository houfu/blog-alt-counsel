    <rect id="med"   width="50" height="50" rx="8" fill="#6F8B5C"/>
    <rect id="sat"   width="50" height="50" rx="8" fill="#2D5F3F"/>
    <rect id="ring"  width="50" height="50" rx="8" fill="#2D5F3F" stroke="#C49449" stroke-width="3"/>
  </defs>

  <!-- Background -->
  <rect width="800" height="970" fill="#F8F4ED"/>

  <!-- Title block -->
  <text x="400" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="600" fill="#2A2520" text-anchor="middle">87 of 100 forks are unchanged copies</text>
  <text x="400" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#6B5F50" text-anchor="middle">Mike's 100 most recently active forks, by commits ahead of upstream</text>

